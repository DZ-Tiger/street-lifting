name: Deploy Street Lifting App
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch:

jobs:
  # CI: Lint, Test & Coverage
  ci:
    uses: ./.github/workflows/lint.yml

  # CD: Deploy (only on main branch and after CI passes)
  deploy:
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
